services:
  # ---------- Backend (Express API) ----------
  - type: web
    name: gaurav-portfolio-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # paste your MongoDB Atlas connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false # set to your deployed frontend URL, e.g. https://gaurav-portfolio-client.onrender.com
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false

  # ---------- Frontend (React + Vite static site) ----------
  - type: web
    name: gaurav-portfolio-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # set to https://gaurav-portfolio-api.onrender.com/api after the backend deploys
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
